version: "3.9"

# ─── Colmena v2 — Orquestador + Runners Efimeros ───
# Levanta: cerebro central, postgres, redis, minio
# Los runners se crean/destruyen por tarea via Docker API

services:
  # ── Cerebro Central ──────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: colmena-brain
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=production
      - PORT=4200
      - POSTGRES_URL=postgresql://colmena:colmena_secret@postgres:5432/colmena
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=colmena
      - MINIO_SECRET_KEY=colmena_secret_key
      - VAULT_TOKEN=${VAULT_TOKEN:-dev-token}
    volumes:
      - ./agents:/app/agents:ro
      - ./policies:/app/policies:ro
      - ./memory:/app/memory
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmena-net

  # ── PostgreSQL — memoria, tareas, estado ─────────────
  postgres:
    image: postgres:16-alpine
    container_name: colmena-db
    environment:
      POSTGRES_DB: colmena
      POSTGRES_USER: colmena
      POSTGRES_PASSWORD: colmena_secret
    volumes:
      - colmena-pgdata:/var/lib/postgresql/data
      - ./services/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colmena"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - colmena-net

  # ── Redis — cola de tareas y coordinacion ────────────
  redis:
    image: redis:7-alpine
    container_name: colmena-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - colmena-redis:/data
    networks:
      - colmena-net

  # ── MinIO — artefactos, screenshots, reportes ───────
  minio:
    image: minio/minio:latest
    container_name: colmena-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: colmena
      MINIO_ROOT_PASSWORD: colmena_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - colmena-minio:/data
    networks:
      - colmena-net

volumes:
  colmena-pgdata:
  colmena-redis:
  colmena-minio:

networks:
  colmena-net:
    driver: bridge
